services:
  logto:
    image: svhd/logto:latest
    ports:
      - 3001:3001
      - 3002:3002
    depends_on:
      postgresql:
        condition: service_healthy
    environment:
      - DB_URL=postgresql://logto:logto@postgresql:5432/logto
      - ENDPOINT=https://157.151.169.121.sslip.io
      - ADMIN_ENDPOINT=https://admin.157.151.169.121.sslip.io
      - TRUST_PROXY_HEADER=true
    entrypoint: ["sh", "-c", "npm run cli db seed && npm start"]

  postgresql:
    image: postgres:14-alpine
    environment:
      - POSTGRES_USER=logto
      - POSTGRES_PASSWORD=logto
      - POSTGRES_DB=logto
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U logto"]
      interval: 5s
      timeout: 5s
      retries: 5
